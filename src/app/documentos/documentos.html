

<main class="py-10 px-6 md:px-25">

  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
      <h1 class="text-4xl font-bold text-edelpa-primary">Documentos en Línea</h1>

      <div class="relative">
          <input type="text"
                  placeholder="Buscar documentos..."
                  class="w-full md:w-80 pl-4 pr-10 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
          <div class="absolute right-3 top-2.5 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
          </div>
      </div>
  </div>

  <div class="mb-8 border-b border-gray-100 pb-8">
      <button class="flex items-center gap-2 px-4 py-2 border border-gray-300 rounded-xl font-semibold text-gray-700 hover:bg-gray-50 transition">
          Tipo
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
      </button>
  </div>

  <div class="space-y-6">
    @for (tipos of listaTiposDocumentos; track $index) {
      <section class="bg-[#f1f3f5] rounded-2xl p-8">
          <h2 class="text-2xl font-bold text-[#334155] mb-8">{{tipos}}</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
              <div class="flex items-start gap-4 group cursor-pointer">
                  <div class="shrink-0 relative">
                      <div class="w-12 h-16 bg-white border border-red-200 rounded-md flex flex-col items-center justify-end pb-1 shadow-sm group-hover:shadow-md transition-shadow">
                          <svg class="w-8 h-8 text-red-500" viewBox="0 0 24 24" fill="currentColor">
                              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V7h2v5z"/>
                          </svg>
                          <span class="text-[8px] font-bold text-red-600">PDF</span>
                      </div>
                  </div>
                  <div>
                      <h3 class="text-xl font-bold text-[#334155] group-hover:text-blue-600 transition-colors">Estatutos</h3>
                      <p class="text-xs text-gray-500">Publicado: 12/06/2021</p>
                  </div>
              </div>
          </div>
      </section>
    }

  </div>
</main>
