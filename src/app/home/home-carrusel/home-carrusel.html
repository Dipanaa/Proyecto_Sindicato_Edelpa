<swiper-container init="false" #SwiperCarrousel>
  @for (aviso of listaAvisos; track $index) {
  <swiper-slide>
    <div class="relative flex h-150 w-full flex-col">
      <img
        [src]="aviso.imagenUrl ? aviso.imagenUrl : '../../../assets/imgs/horizontal-images/alex-kotliarskyi-QBpZGqEMsKg-unsplash.jpg'"
        class="h-1/2 w-full object-cover sm:h-full" />
      <div
        class="bg-edelpa-primary from-edelpa-primary-dark pointer-events-none inset-y-0 left-0 z-10 flex h-1/2 w-full items-center gap-2 bg-linear-to-r to-transparent sm:absolute sm:h-full sm:w-[50%] sm:bg-transparent">
        <section class="px-4 sm:px-10">
          <h1 class="text-2xl font-bold text-white sm:text-3xl">{{ aviso.titulo }}</h1>
          <p class="text-sm text-white sm:text-base">{{ aviso.fecha }}</p>
          <p class="my-4 hidden h-auto wrap-break-word text-white md:line-clamp-4 lg:my-10 lg:line-clamp-6 lg:block">
            {{ aviso.descripcion }}
          </p>
          <a href="https://firebasestorage.googleapis.com/v0/b/bucket-test-galeria/o/codigosQr%2FMenu_Aniversario_SindicatoEdelpa_2026.pdf?alt=media&token=bd06dea6-ccdf-4594-a1a0-04380be838f9"
            target="_blank"
            class="pointer-events-auto mt-2 inline-flex items-center gap-2 rounded-lg bg-white px-4 py-2 text-sm font-semibold text-gray-800 shadow-md transition-colors hover:bg-gray-100 sm:mt-4 sm:text-base">
            Ver Menú
          </a>
        </section>
      </div>
    </div>
  </swiper-slide>
  }
</swiper-container>
