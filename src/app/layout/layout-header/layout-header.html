<!-- Los colores tenemos que ponerlos en una tabla de colores que usemos, para no andar insertandolos siempre -->

<div class="w-full h-10 bg-edelpa-primary"></div>

<header class="w-full bg-white shadow-md relative z-30">
  <div class="flex items-center justify-between h-25 px-6 md:px-25">
    <!-- Hay que arreglar la imagen -->
    <div class="flex items-center">
      <img src="../../../assets/imgs/logo-sindicato-edelpa.png" alt="Logo Sindicato" class="h-16 md:h-20 w-auto">
    </div>

    <!-- Navegación de Escritorio -->
    <nav class="hidden lg:block">
      <ul class="flex items-center gap-7">
        <li>
          <a routerLink="/home" routerLinkActive="border-b-2 border-edelpa-accent pb-1"
            class="text-edelpa-primary font-bold text-[15px] border-b-2 border-transparent hover:border-edelpa-accent pb-1 transition-all cursor-pointer">
            INICIO
          </a>
        </li>
        <li>
          <a routerLink="/sindicato" routerLinkActive="border-b-2 border-edelpa-accent pb-1"
            class="text-edelpa-primary font-bold text-[15px] border-b-2 border-transparent hover:border-edelpa-accent pb-1 transition-all cursor-pointer">
            SINDICATO
          </a>
        </li>
        <li>
          <a routerLink="/galeria" routerLinkActive="border-b-2 border-edelpa-accent pb-1"
            class="text-edelpa-primary font-bold text-[15px] border-b-2 border-transparent hover:border-edelpa-accent pb-1 transition-all cursor-pointer">
            GALERIA
          </a>
        </li>
        <li>
          <a routerLink="/deporte" routerLinkActive="border-b-2 border-edelpa-accent pb-1"
            class="text-edelpa-primary font-bold text-[15px] border-b-2 border-transparent hover:border-edelpa-accent pb-1 transition-all cursor-pointer">
            DEPORTE
          </a>
        </li>
        <li>
          <a routerLink="/bienestar" routerLinkActive="border-b-2 border-edelpa-accent pb-1"
            class="text-edelpa-primary font-bold text-[15px] border-b-2 border-transparent hover:border-edelpa-accent pb-1 transition-all cursor-pointer">
            BIENESTAR
          </a>
        </li>
        <li>
          <a routerLink="/documentos" routerLinkActive="border-b-2 border-edelpa-accent pb-1"
            class="text-edelpa-primary font-bold text-[15px] border-b-2 border-transparent hover:border-edelpa-accent pb-1 transition-all cursor-pointer">
            DOCUMENTOS
          </a>
        </li>
      </ul>
    </nav>

    <!-- Botón Hamburguesa Móvil/Tablet -->
    <button (click)="toggleMenu()"
      class="lg:hidden text-edelpa-primary p-2 focus:outline-none transition-colors hover:text-edelpa-accent"
      aria-label="Abrir menú">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
        class="w-8 h-8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
  </div>
</header>

<!-- Fondo oscuro semitransparente cuando el menú está abierto -->
@if (menuAbierto()) {
<div (click)="toggleMenu()" class="fixed inset-0 bg-black/50 z-40 lg:hidden transition-opacity"></div>
}

<!-- Menú Desplegable Lateral (Derecha) -->
<div
  class="fixed top-0 right-0 h-full w-[280px] sm:w-[320px] bg-white shadow-2xl z-50 transform transition-transform duration-300 ease-in-out lg:hidden flex flex-col"
  [class.translate-x-0]="menuAbierto()" [class.translate-x-full]="!menuAbierto()">

  <!-- Cabecera del Menú Lateral -->
  <div class="flex justify-between items-center p-6 border-b border-gray-100 bg-gray-50/50">
    <span class="text-edelpa-primary font-extrabold text-lg tracking-wider">MENÚ</span>
    <button (click)="toggleMenu()"
      class="text-gray-400 hover:text-edelpa-primary transition-colors focus:outline-none p-1" aria-label="Cerrar menú">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
        class="w-7 h-7">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Enlaces Móviles -->
  <nav class="flex-1 overflow-y-auto px-6 py-8">
    <ul class="flex flex-col gap-6">
      <li>
        <a (click)="toggleMenu()" routerLink="/home"
          routerLinkActive="text-edelpa-accent border-r-4 border-edelpa-accent"
          class="text-edelpa-primary font-bold text-[16px] hover:text-edelpa-accent transition-colors block py-2 pr-2">
          INICIO
        </a>
      </li>
      <li>
        <a (click)="toggleMenu()" routerLink="/sindicato"
          routerLinkActive="text-edelpa-accent border-r-4 border-edelpa-accent"
          class="text-edelpa-primary font-bold text-[16px] hover:text-edelpa-accent transition-colors block py-2 pr-2">
          SINDICATO
        </a>
      </li>
      <li>
        <a (click)="toggleMenu()" routerLink="/galeria"
          routerLinkActive="text-edelpa-accent border-r-4 border-edelpa-accent"
          class="text-edelpa-primary font-bold text-[16px] hover:text-edelpa-accent transition-colors block py-2 pr-2">
          GALERIA
        </a>
      </li>
      <li>
        <a (click)="toggleMenu()" routerLink="/deporte"
          routerLinkActive="text-edelpa-accent border-r-4 border-edelpa-accent"
          class="text-edelpa-primary font-bold text-[16px] hover:text-edelpa-accent transition-colors block py-2 pr-2">
          DEPORTE
        </a>
      </li>
      <li>
        <a (click)="toggleMenu()" routerLink="/bienestar"
          routerLinkActive="text-edelpa-accent border-r-4 border-edelpa-accent"
          class="text-edelpa-primary font-bold text-[16px] hover:text-edelpa-accent transition-colors block py-2 pr-2">
          BIENESTAR
        </a>
      </li>
      <li>
        <a (click)="toggleMenu()" routerLink="/documentos"
          routerLinkActive="text-edelpa-accent border-r-4 border-edelpa-accent"
          class="text-edelpa-primary font-bold text-[16px] hover:text-edelpa-accent transition-colors block py-2 pr-2">
          DOCUMENTOS
        </a>
      </li>
    </ul>
  </nav>

  <!-- Pie del menú lateral (Opcional, puede tener contacto o logo) -->
  <div class="px-6 py-6 border-t border-gray-100 mt-auto flex justify-center">
    <img src="https://www.sindicatoedelpa.cl/assets/img/logo/edelpa2.png" alt="Logo"
      class="h-10 opacity-50 grayscale hover:grayscale-0 transition-all">
  </div>
</div>
